name: Mastodon Release Update

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to announce, for example v0.1.0'
        required: false
        type: string
      release_url:
        description: 'Release URL. Leave blank to use the latest GitHub Release.'
        required: false
        type: string
      message:
        description: 'Optional custom message'
        required: false
        type: string

permissions:
  contents: read

jobs:
  post:
    name: Post release to Mastodon
    runs-on: ubuntu-latest

    steps:
      - name: Build Mastodon status
        id: status
        env:
          CUSTOM_MESSAGE: ${{ inputs.message }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            release_url="${{ github.event.release.html_url }}"
            release_name="${{ github.event.release.name }}"
          else
            version="${{ inputs.version }}"
            release_url="${{ inputs.release_url }}"
            if [ -z "$version" ] || [ -z "$release_url" ]; then
              version="${version:-$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.tag_name')}"
              release_url="${release_url:-$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.html_url')}"
              release_name="$(gh api "repos/${{ github.repository }}/releases/latest" --jq '.name')"
            else
              release_name="NerdyPress ${version}"
            fi
          fi

          if [ -n "$CUSTOM_MESSAGE" ]; then
            status="$CUSTOM_MESSAGE"
          else
            status="$(printf '%s\n\n%s\n%s\n\n%s' \
              "NerdyPress ${version} is out!" \
              "${release_name}" \
              "${release_url}" \
              "#NerdyPress #VitePress #OpenSource")"
          fi

          {
            echo "status<<EOF"
            echo "$status"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Mastodon
        env:
          MASTODON_INSTANCE_URL: ${{ vars.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_VISIBILITY: ${{ vars.MASTODON_VISIBILITY }}
          STATUS: ${{ steps.status.outputs.status }}
        shell: bash
        run: |
          if [ -z "$MASTODON_INSTANCE_URL" ]; then
            echo "Missing repository variable: MASTODON_INSTANCE_URL" >&2
            exit 1
          fi
          if [ -z "$MASTODON_ACCESS_TOKEN" ]; then
            echo "Missing repository secret: MASTODON_ACCESS_TOKEN" >&2
            exit 1
          fi

          visibility="${MASTODON_VISIBILITY:-public}"
          instance="${MASTODON_INSTANCE_URL%/}"

          curl --fail-with-body \
            -X POST "${instance}/api/v1/statuses" \
            -H "Authorization: Bearer ${MASTODON_ACCESS_TOKEN}" \
            --form-string "status=${STATUS}" \
            --form-string "visibility=${visibility}"
