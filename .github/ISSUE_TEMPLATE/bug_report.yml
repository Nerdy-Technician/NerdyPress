name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: bug
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: I expected..., but instead...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to trigger the bug.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Firefox, Chrome, Edge, Safari...
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Drop screenshots, console errors, or build output here.
